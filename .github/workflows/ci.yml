name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install deps
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q \
            build==1.3.0 setuptools==79.0.1 wheel==0.46.3
          pip install -q torch --index-url https://download.pytorch.org/whl/cpu
          pip install -q pytest
          pip install -q -e ./rwkv7-hf-ascend
      - name: rwkv7-hf-ascend (Huawei runtime, quant and oracle)
        run: |
          python -m pytest -q \
            rwkv7-hf-ascend/tests/test_ascend_graph_runtime.py \
            rwkv7-hf-ascend/tests/test_ascend_quant.py \
            rwkv7-hf-ascend/tests/test_ascend_reference_oracle.py \
            rwkv7-hf-ascend/tests/test_ascend_runtime.py \
            rwkv7-hf-ascend/tests/test_ascend_w4_cle.py
      - name: vllm-rwkv-ascend (sampler unit + cpp-forward writeback fix)
        run: cd vllm-rwkv-ascend && PYTHONPATH=serving:. python -m pytest tests/test_sampler.py tests/test_cpp_forward.py tests/test_graph_greedy_scheduler.py tests/test_pth_engine.py -v
      - name: rwkv7-sglang-ascend (WKV recurrence vs reference)
        run: cd rwkv7-sglang-ascend && PYTHONPATH=. python -m pytest tests/test_wkv_unit.py -v
      - name: serving evidence (vLLM/SGLang scheduler and fail-closed quant gates)
        run: python -m pytest -q tests/test_serving_acceptance.py tests/test_serving_soak.py
      - name: release wheel integrity
        run: python -m pytest -q tests/test_release_wheels.py
      - name: reproducible release build and isolated install smoke
        run: |
          python tools/build_release_wheels.py --output /tmp/release-build
          cmp /tmp/release-build/SHA256SUMS release/2026.07.24/SHA256SUMS
          cmp /tmp/release-build/release_manifest.json \
            release/2026.07.24/release_manifest.json
          for wheel in release/2026.07.24/*.whl; do
            cmp "/tmp/release-build/$(basename "$wheel")" "$wheel"
          done
      - name: ascend-optimized (AscendC op-defs + cpp-forward structure)
        run: cd ascend-optimized && python -m pytest tests/test_artifacts.py -v
