name: CI
on:
  push:
    branches: [master, npu-serving-engine]
  pull_request:
    branches: [master]
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: |
          python -m pip install -q --upgrade pip
          pip install -q torch --index-url https://download.pytorch.org/whl/cpu
          pip install -q pytest
      - name: pytest (sampler unit tests; NPU integration auto-skipped)
        run: PYTHONPATH=serving python -m pytest tests/ -v
