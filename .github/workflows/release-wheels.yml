name: Release wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "ascend-*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deterministic build and smoke dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q \
            build==1.3.0 setuptools==79.0.1 wheel==0.46.3
          python -m pip install -q torch \
            --index-url https://download.pytorch.org/whl/cpu
      - name: Rebuild and verify committed artifacts
        run: |
          python tools/build_release_wheels.py --output dist/release
          cmp dist/release/SHA256SUMS release/2026.07.24/SHA256SUMS
          cmp dist/release/release_manifest.json \
            release/2026.07.24/release_manifest.json
          for wheel in release/2026.07.24/*.whl; do
            cmp "dist/release/$(basename "$wheel")" "$wheel"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: rwkv7-ascend-wheels
          path: |
            dist/release/*.whl
            dist/release/release_manifest.json
            dist/release/SHA256SUMS
            release/2026.07.24/ascend_install_smoke.json
      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release/2026.07.24/README.md
          files: |
            dist/release/*.whl
            dist/release/release_manifest.json
            dist/release/SHA256SUMS
            release/2026.07.24/ascend_install_smoke.json
